<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockNotebook 备份浏览器</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3/dist/index.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f5f5f7;
      --panel: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --border: #d2d2d7;
      --accent: #0071e3;
      --accent-light: #e8f4fd;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      white-space: nowrap;
    }
    .file-input {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    input[type="file"] {
      display: none;
    }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #005bb5; }
    .btn.secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn.secondary:hover { background: #e8e8ed; }
    .file-name {
      color: var(--text-secondary);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .meta {
      color: var(--text-secondary);
      font-size: 13px;
      white-space: nowrap;
    }
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 320px;
      min-width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .filters {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .search {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .search-row {
      display: flex;
      gap: 8px;
    }
    .search-btn {
      padding: 8px 14px;
      border-radius: 8px;
    }
    .search:focus { border-color: var(--accent); }
    .filter-row {
      display: flex;
      gap: 8px;
    }
    select {
      flex: 1;
      padding: 7px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: white;
      outline: none;
    }
    .stats {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .stock-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .stock-item {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .stock-item:hover { background: #f2f2f6; }
    .stock-item.active { background: var(--accent-light); }
    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .stock-name {
      font-weight: 600;
      font-size: 15px;
    }
    .stock-code {
      color: var(--text-secondary);
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .stock-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      background: #e8e8ed;
      color: var(--text-secondary);
      border-radius: 12px;
    }
    .stock-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px;
    }
    .empty-state h2 {
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }
    .detail {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }
    .detail-header {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .detail-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    .detail-title h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
    }
    .detail-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      background: #e8e8ed;
      color: var(--text);
    }
    .badge.status {
      background: var(--accent-light);
      color: var(--accent);
    }
    .badge.score {
      background: #fff3cd;
      color: #856404;
    }
    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .note-card {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .note-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .note-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 14px;
      display: flex;
      gap: 12px;
    }
    .note-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
    }
    .note-content h1, .note-content h2, .note-content h3, .note-content h4 {
      margin-top: 20px;
      margin-bottom: 10px;
      color: var(--text);
    }
    .note-content p { margin: 10px 0; }
    .note-content ul, .note-content ol {
      padding-left: 22px;
      margin: 10px 0;
    }
    .note-content li { margin: 4px 0; }
    .note-content code {
      background: #f2f2f6;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .note-content pre {
      background: #f2f2f6;
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
    }
    .note-content blockquote {
      border-left: 4px solid var(--accent);
      margin: 14px 0;
      padding-left: 14px;
      color: var(--text-secondary);
    }
    .note-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 14px 0;
      font-size: 14px;
    }
    .note-content th, .note-content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .note-content th { background: #f2f2f6; }
    .pinned {
      color: var(--accent);
      font-weight: 600;
    }
    .mobile-back {
      display: none;
      align-items: center;
      gap: 4px;
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 16px;
      padding: 0;
      margin-bottom: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    @media (max-width: 768px) {
      header { padding: 10px 14px; gap: 10px; flex-wrap: nowrap; }
      .title { font-size: 15px; }
      .btn { padding: 9px 14px; font-size: 15px; border-radius: 18px; }
      .file-name { display: none; }
      .meta { font-size: 12px; }

      .main { position: relative; }
      .sidebar, .detail {
        width: 100%;
        min-width: auto;
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        border: none;
      }
      .sidebar { display: flex; }
      .detail { display: none; padding: 14px; }
      .main.show-detail .sidebar { display: none; }
      .main.show-detail .detail { display: block; }

      .filters { padding: 12px; gap: 8px; }
      .search-row { gap: 8px; }
      .search { padding: 10px 12px; font-size: 16px; }
      .search-btn { padding: 9px 14px; font-size: 15px; }
      .filter-row { gap: 8px; }
      select { padding: 9px 8px; font-size: 15px; }
      .stats { font-size: 13px; }

      .stock-list { padding: 10px; }
      .stock-item { padding: 16px; margin-bottom: 8px; }
      .stock-name { font-size: 17px; }
      .stock-code { font-size: 14px; }
      .tag { font-size: 13px; padding: 4px 10px; }
      .stock-meta { font-size: 13px; margin-top: 8px; }

      .detail-header { padding: 16px; }
      .detail-title h1 { font-size: 22px; }
      .detail-badges { margin-top: 10px; }
      .badge { font-size: 13px; padding: 5px 11px; }
      .mobile-back { display: inline-flex; }

      .note-card { padding: 16px; }
      .note-title { font-size: 17px; }
      .note-meta { font-size: 13px; }
      .note-content { font-size: 16px; line-height: 1.8; }
      .note-content pre { font-size: 14px; }
      .note-content table { font-size: 13px; }
      .note-content th, .note-content td { padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">StockNotebook 备份浏览器</div>
      <div class="file-input">
        <label for="file" class="btn">选择备份文件</label>
        <input type="file" id="file" accept=".json,application/json">
        <span class="file-name" id="fileName">未选择文件</span>
      </div>
      <div class="meta" id="meta"></div>
    </header>
    <div class="main" id="main">
      <div class="empty-state" id="emptyState">
        <h2>请选择 StockNotebook 备份文件</h2>
        <p>支持格式：StockNotebook_YYYYMMDD_HHmmss.json</p>
      </div>
    </div>
  </div>

  <script>
    let backupData = null;
    let stocks = [];
    let selectedStockCode = null;
    let showingDetail = false;

    const fileInput = document.getElementById('file');
    const fileName = document.getElementById('fileName');
    const meta = document.getElementById('meta');
    const main = document.getElementById('main');

    fileInput.addEventListener('change', handleFile);

    function handleFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      fileName.textContent = file.name;
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          backupData = JSON.parse(event.target.result);
          stocks = backupData.stocks || [];
          enrichStocks(stocks);
          selectedStockCode = stocks.length ? stocks[0].code : null;
          renderApp();
        } catch (err) {
          alert('无法解析该文件：' + err.message);
        }
      };
      reader.readAsText(file);
    }

    function enrichStocks(stocks) {
      stocks.forEach(s => {
        const name = s.name || '';
        s._nameLower = name.toLowerCase();
        if (typeof pinyinPro !== 'undefined' && pinyinPro.pinyin) {
          try {
            const first = pinyinPro.pinyin(name, { pattern: 'first', toneType: 'none', type: 'string', separator: '' });
            s._nameFirst = first.toLowerCase();
            const full = pinyinPro.pinyin(name, { toneType: 'none', type: 'string', separator: '' });
            s._namePinyin = full.toLowerCase();
          } catch (e) {
            s._nameFirst = '';
            s._namePinyin = '';
          }
        } else {
          s._nameFirst = '';
          s._namePinyin = '';
        }
      });
    }

    function renderApp() {
      const tags = collectTags(stocks);
      const statuses = collectValues(stocks, 'statusRaw');
      const markets = collectValues(stocks, 'marketRaw');

      main.innerHTML = `
        <aside class="sidebar">
          <div class="filters">
            <div class="search-row">
              <input type="text" class="search" id="searchInput" placeholder="名称 / 代码 / 拼音首字母 / 笔记内容...">
              <button type="button" class="btn secondary search-btn" id="searchBtn">搜索</button>
            </div>
            <div class="filter-row">
              <select id="tagFilter"><option value="">全部标签</option>${optionsHtml(tags)}</select>
              <select id="statusFilter"><option value="">全部状态</option>${optionsHtml(statuses)}</select>
            </div>
            <div class="filter-row">
              <select id="marketFilter"><option value="">全部市场</option>${optionsHtml(markets)}</select>
            </div>
            <div class="stats" id="stats"></div>
          </div>
          <div class="stock-list" id="stockList"></div>
        </aside>
        <section class="detail" id="detail"></section>
      `;

      meta.textContent = `股票 ${stocks.length} 只 · 笔记 ${stocks.reduce((sum, s) => sum + (s.notes?.length || 0), 0)} 条`;

      updateMainClass();
      bindFilters();
      renderStockList();
      renderDetail();
    }

    function updateMainClass() {
      if (showingDetail) {
        main.classList.add('show-detail');
      } else {
        main.classList.remove('show-detail');
      }
    }

    function collectTags(stocks) {
      const set = new Set();
      stocks.forEach(s => (s.tagNames || []).forEach(t => set.add(t)));
      return Array.from(set).sort();
    }

    function collectValues(stocks, key) {
      const set = new Set();
      stocks.forEach(s => { if (s[key]) set.add(s[key]); });
      return Array.from(set).sort();
    }

    function optionsHtml(values) {
      return values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
    }

    function bindFilters() {
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', renderStockList);
      searchInput.addEventListener('keyup', renderStockList);
      searchInput.addEventListener('compositionend', renderStockList);
      searchInput.addEventListener('change', renderStockList);

      document.getElementById('searchBtn').addEventListener('click', renderStockList);

      ['tagFilter', 'statusFilter', 'marketFilter'].forEach(id => {
        document.getElementById(id).addEventListener('change', renderStockList);
      });
    }

    function getFilteredStocks() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const tag = document.getElementById('tagFilter').value;
      const status = document.getElementById('statusFilter').value;
      const market = document.getElementById('marketFilter').value;

      const filtered = stocks.filter(s => {
        if (tag && !(s.tagNames || []).includes(tag)) return false;
        if (status && s.statusRaw !== status) return false;
        if (market && s.marketRaw !== market) return false;
        return true;
      });

      if (!query) return filtered;

      const nameMatches = [];
      const broadMatches = [];

      filtered.forEach(s => {
        const name = (s.name || '').toLowerCase();
        const code = (s.code || '').toLowerCase();
        const isNameMatch =
          name.includes(query) ||
          code.includes(query) ||
          (s._nameFirst && s._nameFirst.includes(query)) ||
          (s._namePinyin && s._namePinyin.includes(query));

        if (isNameMatch) {
          nameMatches.push(s);
          return;
        }

        const hay = [
          s.statusRaw,
          s.marketRaw,
          (s.tagNames || []).join(' '),
          ...(s.notes || []).map(n => [n.title, n.content, n.typeRaw].join(' '))
        ].join(' ').toLowerCase();
        if (hay.includes(query)) {
          broadMatches.push(s);
        }
      });

      return nameMatches.length ? nameMatches : broadMatches;
    }

    function renderStockList() {
      const list = getFilteredStocks();
      document.getElementById('stats').textContent = `显示 ${list.length} / ${stocks.length} 只股票`;

      const html = list.map(s => {
        const tags = (s.tagNames || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
        return `
          <div class="stock-item ${s.code === selectedStockCode ? 'active' : ''}" data-code="${escapeHtml(s.code)}">
            <div class="stock-header">
              <span class="stock-name">${escapeHtml(s.name)} ${s.pinned ? '●' : ''}</span>
              <span class="stock-code">${escapeHtml(s.code)}</span>
            </div>
            <div class="stock-tags">${tags}</div>
            <div class="stock-meta">
              <span>${escapeHtml(s.statusRaw || '')}</span>
              <span>${s.notes?.length || 0} 条笔记</span>
            </div>
          </div>
        `;
      }).join('');

      const stockList = document.getElementById('stockList');
      stockList.innerHTML = html || '<div style="padding:20px;color:var(--text-secondary);text-align:center;">没有匹配的股票</div>';
      stockList.querySelectorAll('.stock-item').forEach(el => {
        el.addEventListener('click', () => {
          selectedStockCode = el.dataset.code;
          showDetail();
        });
      });
    }

    function showDetail() {
      showingDetail = true;
      updateMainClass();
      renderStockList();
      renderDetail();
    }

    function showList() {
      showingDetail = false;
      updateMainClass();
      renderDetail();
    }

    function renderDetail() {
      const detail = document.getElementById('detail');
      const stock = stocks.find(s => s.code === selectedStockCode);
      if (!stock) {
        detail.innerHTML = '<div class="empty-state"><p>请选择一只股票</p></div>';
        return;
      }

      const tags = (stock.tagNames || []).map(t => `<span class="badge">${escapeHtml(t)}</span>`).join('');
      const notes = (stock.notes || []).sort((a, b) => {
        if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
        return new Date(b.date || b.createdAt) - new Date(a.date || a.createdAt);
      });

      detail.innerHTML = `
        <button class="mobile-back" id="backBtn" type="button">← 返回列表</button>
        <div class="detail-header">
          <div class="detail-title">
            <h1>${escapeHtml(stock.name)}</h1>
            <span class="stock-code" style="font-size:16px;">${escapeHtml(stock.code)}</span>
          </div>
          <div class="detail-badges">
            ${stock.statusRaw ? `<span class="badge status">${escapeHtml(stock.statusRaw)}</span>` : ''}
            ${stock.marketRaw ? `<span class="badge">${escapeHtml(stock.marketRaw)}</span>` : ''}
            ${typeof stock.manualScore === 'number' ? `<span class="badge score">评分 ${stock.manualScore}</span>` : ''}
            ${tags}
          </div>
        </div>
        <div class="notes-list">
          ${notes.map(n => renderNote(n)).join('')}
        </div>
      `;

      const backBtn = document.getElementById('backBtn');
      if (backBtn) backBtn.addEventListener('click', showList);
    }

    function renderNote(note) {
      const dateStr = formatDate(note.date || note.createdAt);
      const content = renderMarkdown(note.content || '');
      return `
        <div class="note-card">
          <div class="note-title">${note.pinned ? '<span class="pinned">●</span> ' : ''}${escapeHtml(note.title || '无标题')}</div>
          <div class="note-meta">
            <span>${escapeHtml(note.typeRaw || '')}</span>
            <span>${dateStr}</span>
          </div>
          <div class="note-content">${content}</div>
        </div>
      `;
    }

    function renderMarkdown(text) {
      if (typeof marked !== 'undefined' && marked.parse) {
        try {
          return marked.parse(text, { breaks: true });
        } catch (e) {}
      }
      return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function pad(n) { return n < 10 ? '0' + n : n; }
  </script>
</body>
</html>
